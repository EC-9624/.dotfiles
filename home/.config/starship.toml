"$schema" = "https://starship.rs/config-schema.json"

scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = true
palette = "rose_pine"

format = """
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$cmd_duration\
$line_break\
$python\
$character\
"""

[directory]
style = "foam"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold iris)"
error_symbol = "[❯](bold love)"
vimcmd_symbol = "[❮](bold gold)"

[cmd_duration]
min_time = 5000
style = "yellow"
format = " [ $duration ]($style)"

[python]
format = "([$virtualenv]($style) )"
style = "muted"
detect_extensions = []
detect_files = []
detect_folders = []

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL"
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "[$output](subtle)"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "[](surface) "
style = "fg:gold bg:surface"
format = " [$symbol$branch]($style)[](surface) "

[git_status]
format = "$untracked$staged$modified$renamed$deleted$conflicted$ahead_behind"
staged = "[+${count} ](foam)"
modified = "[!${count} ](rose)"
renamed = "[»${count} ](pine)"
deleted = "[-${count} ](love)"
untracked = "[?${count} ](gold)"
stashed = "[≡${count} ](iris)"
conflicted = "[✖${count} ](love bold)"
ahead = "[⇡${count} ](subtle)"
behind = "[⇣${count} ](subtle)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count} ](subtle)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "⛓"
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "([ $output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true

[palettes.rose_pine]
base = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
muted = "#6e6a86"
subtle = "#908caa"
text = "#e0def4"
love = "#eb6f92"
gold = "#f6c177"
rose = "#ebbcba"
pine = "#31748f"
foam = "#9ccfd8"
iris = "#c4a7e7"
